# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Maintain GitHub Actions dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # Maintain Gradle and Version Catalog dependencies
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
    # Automatically rebases PRs when the main branch changes
    rebase-strategy: "auto"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "kotlin"

    groups:
      # 1. Unified Android Core: Kotlin + KSP + Compose
      android-core:
        patterns:
          - "org.jetbrains.kotlin*"   # Catch Kotlin, Compose Plugin, & Serialization
          - "com.google.devtools.ksp*" # KSP must match Kotlin version
          - "androidx.compose*"       # All Compose libraries + BOM
          - "androidx.activity*"      # Often updated with Compose
          - "androidx.lifecycle*"     # Runtime/ViewModel hooks for Compose
          - "androidx.navigation3*"   # Navigation 3 libraries updated with Compose
        exclude-patterns:
          - "org.jetbrains.kotlinx:kotlinx-coroutines-test"

      # 2. Testing Stack
      # Keeps your test runner and assertion libraries together.
      testing-suite:
        patterns:
          - "org.junit*"
          - "androidx.test*"
          - "app.cash.turbine"
          - "org.jetbrains.kotlinx:kotlinx-coroutines-test"
          - "com.android.tools.journeys*"

      # 3. Dependency Injection
      # Hilt and its Compose/Navigation integrations.
      dependency-injection:
        patterns:
          - "com.google.dagger.hilt*" # Hilt Gradle plugin id
          - "com.google.dagger:hilt-*" # Hilt libraries (e.g. hilt-android, hilt-compiler)
          - "androidx.hilt*"
